---
- shell: "{{ BREW }} cleanup 2>&1 | grep -v Warning"
  register: shell
  changed_when: shell.stdout | default('', true) | length > 0
  failed_when: false
  when: not SCRUB

- shell: "{{ BREW }} cleanup -s 2>&1 | grep -v Warning"
  register: shell
  changed_when: shell.stdout | default('', true) | length > 0
  failed_when: false
  when: SCRUB

- debug: var=shell
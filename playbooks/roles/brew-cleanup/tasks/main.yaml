---
- name: "cleanup"
  shell: "{{ BREW }} cleanup 2>&1 | grep -v Warning"
  register: shell
  changed_when: shell.stdout | default('', true) | length > 0
  failed_when: false
  when: not SCRUB

- name: "cleanup scrub"
  shell: "{{ BREW }} cleanup -s 2>&1 | grep -v Warning"
  register: shell
  changed_when: shell.stdout | default('', true) | length > 0
  failed_when: false
  when: SCRUB

- name: "doctor"
  shell: "{{ BREW }} doctor 2>&1"
  changed_when: false

- debug: var=shell
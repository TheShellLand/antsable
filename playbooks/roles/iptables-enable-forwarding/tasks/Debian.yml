---
- name: enable ipv4 ipv6 forwarding
  shell: |
    # Enabling IPv4 forwarding
    echo "1" > /proc/sys/net/ipv4/ip_forward
    sysctl -w net.ipv4.ip_forward=1

    # Enabling IPv6 forwarding
    echo "1" > /proc/sys/net/ipv6/ip_forward
    sysctl -w net.ipv6.conf.all.forwarding=1
    
    sed -i 's/#net.ipv4.ip_forward=1/net.ipv4.ip_forward=1/g' /etc/sysctl.conf
    sed -i 's/#net.ipv6.conf.all.forwarding=1/net.ipv6.conf.all.forwarding=1/g' /etc/sysctl.conf

    sysctl -p
    
    #echo "net.ipv4.ip_forward = 1" | sudo tee /etc/sysctl.d/50-enable-ipv4-forwarding.conf
    #sysctl -p /etc/sysctl.d/50-enable-ipv4-forwarding.conf
  become: yes
  changed_when: false

- name: get default interface
  shell: ip route | grep -m 1 default | awk '{print $5}'
  register: shell
  failed_when: shell.stderr | default('', true) | length > 0
  changed_when: false

- set_fact:
    interface: "{{shell.stdout}}"

- name: configure iptables v4
  shell: |
    touch /etc/network/iptables.up.rules
    iptables -t nat -C POSTROUTING -o {{ interface }} -j MASQUERADE || \
    iptables -t nat -A POSTROUTING -o {{ interface }} -j MASQUERADE
  become: yes
  register: shell
#  failed_when: shell.stderr | default('', true) | length > 0
  changed_when: false

- name: configure iptables v6
  shell: |
    touch /etc/network/ip6tables.up.rules
    ip6tables -t nat -C POSTROUTING -o {{ interface }} -j MASQUERADE || \
    ip6tables -t nat -A POSTROUTING -o {{ interface }} -j MASQUERADE
  become: yes
  register: shell
#  failed_when: shell.stderr | default('', true) | length > 0
  changed_when: false

- include_role: name=iptables-save
- include_role: name=iptables-show-rules

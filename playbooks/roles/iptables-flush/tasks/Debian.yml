---
- name: flush iptables v4
  shell: |
    # Set default policies to ACCEPT to prevent lockout
    iptables -P INPUT ACCEPT
    iptables -P FORWARD ACCEPT
    iptables -P OUTPUT ACCEPT

    # Flush all rules and delete custom chains across all tables
    iptables -F
    iptables -X
    iptables -t nat -F
    iptables -t nat -X
    iptables -t mangle -F
    iptables -t mangle -X
    iptables -t raw -F
    iptables -t raw -X
    iptables -t security -F
    iptables -t security -X

    # Zero out packet and byte counters
    iptables -Z
  become: yes
  changed_when: false

- name: flush iptables v6
  shell: |
    # Set default policies to ACCEPT
    ip6tables -P INPUT ACCEPT
    ip6tables -P FORWARD ACCEPT
    ip6tables -P OUTPUT ACCEPT

    # Flush all rules and delete custom chains across all tables
    ip6tables -F
    ip6tables -X
    ip6tables -t nat -F
    ip6tables -t nat -X
    ip6tables -t mangle -F
    ip6tables -t mangle -X
    ip6tables -t raw -F
    ip6tables -t raw -X
    ip6tables -t security -F
    ip6tables -t security -X

    # Zero out packet and byte counters
    ip6tables -Z
  become: yes
  changed_when: false
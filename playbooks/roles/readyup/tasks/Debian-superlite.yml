---
- set_fact:
    install: /tmp/readyup

- name: temp install
  file: path={{ install }} state=directory

- name: Update cache
  apt: update_cache=yes
  become: yes
  changed_when: false

- name: Install Missing Packages
  shell: apt install -f -y
  register: shell
  changed_when: false
  become: yes

- include_role: name=git
- include_role: name=curl
- include_role: name=tmux
- include_role: name=htop
- include_role: name=docker

- include_role:
    name: apt-installer
  vars:
    package: sshfs

- include_role:
    name: apt-installer
  vars:
    package: vim

- name: autoclean
  apt:
    autoclean: yes
  become: yes
  changed_when: false

- name: autoremove
  apt:
    autoremove: yes
  become: yes
  changed_when: false
